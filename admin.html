<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Appetie — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--white:#fff;--black:#1a1a1a;--muted:#888;
  --border:#ECEAE4;--hover:#FAFAF8;--accent:#1a1a1a;
  --green:#2D6A4F;--red:#C0392B;--yellow:#F39C12;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--black);min-height:100vh}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;background:var(--black);
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
.login-box{text-align:center;color:#fff}
.login-box h1{font-family:'DM Serif Display',serif;font-size:36px;margin-bottom:8px}
.login-box p{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:32px}
.login-box input{
  display:block;width:280px;padding:14px 20px;border:none;
  background:rgba(255,255,255,.1);color:#fff;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:15px;margin:0 auto 12px;
  outline:none;letter-spacing:.05em;
}
.login-box input::placeholder{color:rgba(255,255,255,.3)}
.login-box input:focus{background:rgba(255,255,255,.15)}
.login-btn{
  width:280px;padding:14px;background:#fff;color:var(--black);
  border:none;border-radius:10px;font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;
}
.login-btn:hover{opacity:.9}
.login-error{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:16px}

/* ── TOPBAR ── */
.topbar{
  background:var(--black);color:#fff;padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.brand{font-family:'DM Serif Display',serif;font-size:20px}
.brand span{
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;
  border-radius:20px;margin-left:12px;
}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn{
  padding:9px 18px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
}
.btn-white{background:#fff;color:var(--black)}
.btn-white:hover{background:#f0f0f0}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-green{background:#27AE60;color:#fff}
.btn-green:hover{background:#219a52}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#a93226}
.btn-yellow{background:var(--yellow);color:#fff}
.btn-yellow:hover{background:#d68910}
.btn-sm{padding:6px 12px;font-size:12px}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 57px)}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;background:var(--white);border-right:1px solid var(--border);
  padding:24px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;
}
.sidebar-label{
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:#bbb;padding:0 20px;margin-bottom:8px;margin-top:20px;
}
.sidebar-label:first-child{margin-top:0}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  cursor:pointer;font-size:14px;font-weight:500;color:#555;
  transition:all .15s;border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:#f5f3ef;color:var(--black)}
.nav-item.active{background:#F7F4EF;color:var(--black);font-weight:600;border-right:3px solid var(--black)}
.nav-emoji{font-size:16px;width:20px;text-align:center}
.nav-count{
  margin-left:auto;background:#eee;color:#666;
  font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;
}

/* ── MAIN ── */
.main{flex:1;padding:32px;overflow-y:auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--white);border-radius:12px;padding:20px 24px;border:1px solid var(--border)}
.stat-num{font-family:'DM Serif Display',serif;font-size:32px;line-height:1}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.03em}

/* ── ITEMS TABLE ── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;margin-top:8px;
}
.section-title{font-size:16px;font-weight:600}

.items-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.items-table thead tr{background:#FAFAF8}
.items-table thead th{
  padding:12px 16px;font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:#aaa;text-align:left;border-bottom:1px solid var(--border);
}
.items-table thead th:last-child{text-align:center}
.items-table tbody tr{border-bottom:1px solid #F5F3EF;transition:background .1s}
.items-table tbody tr:hover{background:#FAFAF8}
.items-table tbody tr:last-child{border-bottom:none}
.items-table tbody td{padding:12px 16px;font-size:13px;color:#444;vertical-align:middle}

/* Photo cell */
.photo-cell{display:flex;align-items:center;gap:12px}
.item-thumb{
  width:48px;height:48px;border-radius:8px;object-fit:cover;
  flex-shrink:0;border:1px solid var(--border);
}
.no-thumb{
  width:48px;height:48px;border-radius:8px;background:#F0EDE8;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;border:1px solid var(--border);cursor:pointer;
}
.photo-upload-btn{
  font-size:11px;color:var(--muted);cursor:pointer;
  text-decoration:underline;background:none;border:none;font-family:'DM Sans',sans-serif;
  padding:0;
}
.photo-upload-btn:hover{color:var(--black)}

/* Inline edit */
.editable{
  background:none;border:none;font-family:'DM Sans',sans-serif;
  font-size:13px;color:#444;width:100%;outline:none;padding:4px 6px;
  border-radius:6px;transition:background .15s;
}
.editable:focus{background:#F0EDE8;color:var(--black)}
.editable.name{font-weight:600;color:var(--black);font-size:14px}

.kcal-badge{
  display:inline-block;background:var(--black);color:#fff;
  border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;
}
.dash-val{color:#ccc}

/* Actions */
.actions-cell{display:flex;gap:6px;justify-content:center}

/* ── ADD ITEM FORM ── */
.add-form{
  background:var(--white);border:1px solid var(--border);border-radius:12px;
  padding:24px;margin-top:20px;
}
.add-form h3{font-size:15px;font-weight:600;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.form-input{
  width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:13px;outline:none;
  transition:border-color .15s;background:var(--bg);
}
.form-input:focus{border-color:#aaa;background:#fff}
.form-actions{display:flex;gap:10px;align-items:center}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--black);color:#fff;
  padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;
  opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:9998;
}
.toast.show{opacity:1;transform:translateY(0)}

/* ── HIDDEN FILE INPUT ── */
.file-input{display:none}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr 1fr}
  .main{padding:20px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Appetie</h1>
    <p>Admin Dashboard — Restricted Access</p>
    <input type="password" id="pwd-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- HIDDEN FILE INPUT -->
<input type="file" class="file-input" id="file-input" accept="image/*"/>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">Appetie <span>Admin</span></div>
  <div class="topbar-actions">
    <button class="btn btn-green" onclick="exportHTML()">⬇ Export index.html</button>
    <button class="btn btn-ghost" onclick="logout()">Sign Out</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-label">Sections</div>
    <button class="nav-item active" onclick="showSection('all',this)"><span class="nav-emoji">📊</span> Overview</button>
    <button class="nav-item" onclick="showSection('salads',this)"><span class="nav-emoji">🥗</span> Salads <span class="nav-count" id="cnt-salads">0</span></button>
    <button class="nav-item" onclick="showSection('chips',this)"><span class="nav-emoji">🥔</span> Chips <span class="nav-count" id="cnt-chips">0</span></button>
    <button class="nav-item" onclick="showSection('sandwiches',this)"><span class="nav-emoji">🥪</span> Sandwiches <span class="nav-count" id="cnt-sandwiches">0</span></button>
    <button class="nav-item" onclick="showSection('sweets',this)"><span class="nav-emoji">🌿</span> Healthy Sweets <span class="nav-count" id="cnt-sweets">0</span></button>
    <button class="nav-item" onclick="showSection('rice',this)"><span class="nav-emoji">🍚</span> Rice Plates <span class="nav-count" id="cnt-rice">0</span></button>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-content">
    <!-- Filled by JS -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// PASSWORD
// ══════════════════════════════════════════════
const PASSWORD = "appetie2025";

function doLogin(){
  const val = document.getElementById('pwd-input').value;
  if(val === PASSWORD){
    document.getElementById('login-screen').style.display='none';
    init();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password. Try again.';
    document.getElementById('pwd-input').value='';
  }
}

function logout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pwd-input').value='';
}

// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════

let data = {};
let currentSection = 'all';
let pendingPhotoItemId = null;

function loadData(){
  const saved = localStorage.getItem('appetie_data');
  if(saved){ try{ data = JSON.parse(saved); }catch(e){ data = JSON.parse(JSON.stringify(DEFAULT_DATA)); } }
  else{ data = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  // Clean up junk items (blank name, single char, or known deleted items)
  const deleted = ['Caesar Salad','Crunchy Corn'];
  for(const sec of Object.values(data)){
    sec.items = sec.items.filter(i => i.name && i.name.trim().length > 1 && !deleted.includes(i.name.trim()));
  }
  saveData();
}

function saveData(){
  localStorage.setItem('appetie_data', JSON.stringify(data));
}

function getItem(id){
  for(const sec of Object.values(data)){
    const item = sec.items.find(i=>i.id===id);
    if(item) return {item, sec};
  }
  return null;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init(){
  loadData();
  updateCounts();
  renderOverview();

  document.getElementById('file-input').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file || !pendingPhotoItemId) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      const found = getItem(pendingPhotoItemId);
      if(found){ found.item.photo = ev.target.result; saveData(); renderCurrent(); toast('Photo updated! ✓'); }
    };
    reader.readAsDataURL(file);
    this.value='';
  });

  // Delegated events on main content
  document.getElementById("main-content").addEventListener("click", function(e){
    const btn = e.target.closest("[data-action]");
    if(!btn) return;
    const action = btn.dataset.action;
    const id = btn.dataset.id;
    if(action === "photo"){ triggerPhotoUpload(id); }
    if(action === "delete"){
      const sec = btn.dataset.section;
      if(!confirm("Delete this item?")) return;
      data[sec].items = data[sec].items.filter(i=>i.id!==id);
      saveData();
      renderSection(sec);
      updateCounts();
      toast("Item deleted");
    }
  });

  document.getElementById("main-content").addEventListener("change", function(e){
    const input = e.target.closest("input.editable");
    if(!input) return;
    const id = input.dataset.id;
    const field = input.dataset.field;
    if(!id || !field) return;
    updateField(id, field, input.value);
  });
}

function updateCounts(){
  for(const [key, sec] of Object.entries(data)){
    const el = document.getElementById('cnt-'+key);
    if(el) el.textContent = sec.items.length;
  }
}

function renderCurrent(){
  if(currentSection==='all') renderOverview();
  else renderSection(currentSection);
  updateCounts();
}

// ══════════════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════════════
function renderOverview(){
  currentSection='all';
  const total = Object.values(data).reduce((a,s)=>a+s.items.length,0);
  const withPhoto = Object.values(data).reduce((a,s)=>a+s.items.filter(i=>i.photo).length,0);
  const withNutrition = Object.values(data).reduce((a,s)=>a+s.items.filter(i=>i.kcal!==null).length,0);

  let sectionsHTML = '';
  for(const [key, sec] of Object.entries(data)){
    const preview = sec.items.slice(0,3).map(i=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f3ef">
        ${i.photo ? `<img src="${i.photo}" style="width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0">` : `<div style="width:36px;height:36px;border-radius:6px;background:#f0ede8;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">📷</div>`}
        <span style="font-size:13px;font-weight:600;flex:1">${i.name}</span>
        ${i.kcal ? `<span style="font-size:12px;background:#1a1a1a;color:#fff;padding:2px 8px;border-radius:10px">${i.kcal}</span>` : `<span style="font-size:12px;color:#ccc">—</span>`}
      </div>`).join('');

    sectionsHTML += `
      <div style="background:#fff;border:1px solid #ECEAE4;border-radius:12px;padding:20px;cursor:pointer" onclick="showSection('${key}', null)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:22px">${sec.emoji}</span>
            <span style="font-size:16px;font-weight:600">${sec.title}</span>
          </div>
          <span style="font-size:12px;background:#f0ede8;padding:4px 10px;border-radius:10px;font-weight:600">${sec.items.length} items</span>
        </div>
        ${preview}
        ${sec.items.length > 3 ? `<div style="font-size:12px;color:#aaa;margin-top:10px;text-align:center">+${sec.items.length-3} more items — click to manage</div>` : ''}
      </div>`;
  }

  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard Overview</div>
        <div class="page-sub">Manage all menu items, photos and nutrition data</div>
      </div>
      <button class="btn btn-green" onclick="exportHTML()">⬇ Export Website</button>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total Items</div></div>
      <div class="stat-card"><div class="stat-num">${withPhoto}</div><div class="stat-lbl">With Photos</div></div>
      <div class="stat-card"><div class="stat-num">${withNutrition}</div><div class="stat-lbl">With Nutrition Data</div></div>
      <div class="stat-card"><div class="stat-num">${Object.keys(data).length}</div><div class="stat-lbl">Sections</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">
      ${sectionsHTML}
    </div>`;
}

// ══════════════════════════════════════════════
// SECTION VIEW
// ══════════════════════════════════════════════
function renderSection(key){
  currentSection = key;
  const sec = data[key];

  const rows = sec.items.map(item => `
    <tr id="row-${item.id}">
      <td>
        <div class="photo-cell">
          <div data-action="photo" data-id="${item.id}" title="Click to change photo" style="cursor:pointer">
            ${item.photo
              ? `<img class="item-thumb" src="${item.photo}" alt="">`
              : `<div class="no-thumb">📷</div>`}
          </div>
          <div>
            <div style="font-size:11px;color:#aaa;margin-bottom:2px">Photo</div>
            <button class="photo-upload-btn" data-action="photo" data-id="${item.id}">
              ${item.photo ? 'Change' : 'Upload'}
            </button>
          </div>
        </div>
      </td>
      <td><input class="editable name" value="${item.name.replace(/"/g,'&quot;')}" data-id="${item.id}" data-field="name"/></td>
      <td><input class="editable" type="number" value="${item.kcal??''}" placeholder="—" data-id="${item.id}" data-field="kcal" style="width:70px;text-align:center"/></td>
      <td><input class="editable" type="number" value="${item.fat??''}" placeholder="—" data-id="${item.id}" data-field="fat" style="width:60px;text-align:center"/></td>
      <td><input class="editable" type="number" value="${item.carbs??''}" placeholder="—" data-id="${item.id}" data-field="carbs" style="width:60px;text-align:center"/></td>
      <td><input class="editable" type="number" value="${item.protein??''}" placeholder="—" data-id="${item.id}" data-field="protein" style="width:60px;text-align:center"/></td>
      <td><input class="editable" type="number" value="${item.sugars??''}" placeholder="—" data-id="${item.id}" data-field="sugars" style="width:60px;text-align:center"/></td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-red btn-sm" data-action="delete" data-id="${item.id}" data-section="${key}">Delete</button>
        </div>
      </td>
    </tr>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${sec.emoji} ${sec.title}</div>
        <div class="page-sub">${sec.items.length} items · Click any field to edit · Click photo to upload</div>
      </div>
      <button class="btn btn-green" onclick="exportHTML()">⬇ Export Website</button>
    </div>
    <table class="items-table">
      <thead>
        <tr>
          <th>Photo</th>
          <th>Item Name</th>
          <th>Calories</th>
          <th>Fat (g)</th>
          <th>Carbs (g)</th>
          <th>Protein (g)</th>
          <th>Sugars (g)</th>
          <th style="text-align:center">Actions</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="add-form">
      <h3>➕ Add New Item</h3>
      <div class="form-grid">
        <div class="form-group"><label>Item Name *</label><input class="form-input" id="new-name" placeholder="e.g. Greek Salad"/></div>
        <div class="form-group"><label>Calories</label><input class="form-input" id="new-kcal" type="number" placeholder="—"/></div>
        <div class="form-group"><label>Fat (g)</label><input class="form-input" id="new-fat" type="number" placeholder="—"/></div>
        <div class="form-group"><label>Carbs (g)</label><input class="form-input" id="new-carbs" type="number" placeholder="—"/></div>
        <div class="form-group"><label>Protein (g)</label><input class="form-input" id="new-protein" type="number" placeholder="—"/></div>
        <div class="form-group"><label>Sugars (g)</label><input class="form-input" id="new-sugars" type="number" placeholder="—"/></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-green" onclick="addItem('${key}')">Add Item</button>
        <span style="font-size:12px;color:var(--muted)">You can upload a photo after adding the item</span>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════
function showSection(key, btn){
  currentSection = key;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else {
    document.querySelectorAll('.nav-item').forEach(b=>{
      if(b.textContent.includes(key==='all'?'Overview': data[key]?.title||'')) b.classList.add('active');
    });
  }
  if(key==='all') renderOverview();
  else renderSection(key);
}

function triggerPhotoUpload(itemId){
  pendingPhotoItemId = itemId;
  document.getElementById('file-input').click();
}

function updateField(itemId, field, value){
  const found = getItem(itemId);
  if(!found) return;
  if(field==='name'){
    found.item[field] = value.trim() || found.item[field];
  } else {
    found.item[field] = value==='' ? null : parseFloat(value);
  }
  saveData();
  toast('Saved ✓');
}

function deleteItem(sectionKey, itemId){
  if(!confirm('Delete this item?')) return;
  data[sectionKey].items = data[sectionKey].items.filter(i=>i.id!==itemId);
  saveData();
  renderSection(sectionKey);
  updateCounts();
  toast('Item deleted');
}

function addItem(sectionKey){
  const name = document.getElementById('new-name').value.trim();
  if(!name){ alert('Please enter an item name'); return; }
  const kcal = document.getElementById('new-kcal').value;
  const fat = document.getElementById('new-fat').value;
  const carbs = document.getElementById('new-carbs').value;
  const protein = document.getElementById('new-protein').value;
  const sugars = document.getElementById('new-sugars').value;
  const id = sectionKey + '_' + Date.now();
  data[sectionKey].items.push({
    id, name,
    kcal: kcal==='' ? null : parseFloat(kcal),
    fat: fat==='' ? null : parseFloat(fat),
    carbs: carbs==='' ? null : parseFloat(carbs),
    protein: protein==='' ? null : parseFloat(protein),
    sugars: sugars==='' ? null : parseFloat(sugars),
    photo: ''
  });
  saveData();
  renderSection(sectionKey);
  updateCounts();
  toast('Item added! ✓');
}

// ══════════════════════════════════════════════
// EXPORT HTML
// ══════════════════════════════════════════════
function exportHTML(){
  toast('Building website... ⏳');
  setTimeout(()=>{
    const html = buildIndexHTML();
    const blob = new Blob([html], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    a.click();
    toast('index.html downloaded! Upload to GitHub ✓');
  }, 300);
}

function buildIndexHTML(){
  function v(x){ return x===null||x===undefined ? '<span class="dash">—</span>' : String(x); }
  function imgCell(item){
    if(item.photo) return `<img class="item-photo" src="${item.photo}" alt="${item.name}">`;
    return `<div class="no-img">📷</div>`;
  }
  function kcalCell(x){ return x!==null&&x!==undefined ? `<span class="kcal-pill">${x}</span>` : `<span class="dash">—</span>`; }

  const thead = `<thead><tr><th></th><th>Item</th><th>Calories</th><th>Total Fat (g)</th><th>Total Carbs (g)</th><th>Protein (g)</th><th>Natural Sugars (g)</th></tr></thead>`;

  let sectionsHTML = '';
  let tabsHTML = '';
  const keys = Object.keys(data);
  keys.forEach((key,i)=>{
    const sec = data[key];
    const rows = sec.items.map(item=>`<tr><td>${imgCell(item)}</td><td>${item.name}</td><td>${kcalCell(item.kcal)}</td><td>${v(item.fat)}</td><td>${v(item.carbs)}</td><td>${v(item.protein)}</td><td>${v(item.sugars)}</td></tr>`).join('\n');
    tabsHTML += `<button class="tab${i===0?' active':''}" onclick="show('${key}',this)">${sec.emoji} ${sec.title}</button>`;
    sectionsHTML += `
<div class="section-card${i===0?' active':''}" id="${key}">
  <div class="card-header">
    <div><span class="header-emoji">${sec.emoji}</span><div class="header-title">${sec.title}</div><div class="header-sub">Nutritional Information</div></div>
    <div class="item-count"><span class="num">${sec.items.length}</span><span class="lbl">items</span></div>
  </div>
  <div class="table-wrap"><table>${thead}<tbody>${rows}</tbody></table></div>
  <div class="card-footer"><div class="footer-dot"></div><p><strong>All sugars in these dishes are 100% natural &amp; healthy</strong> &nbsp;&middot;&nbsp; جميع السكريات في هذه الأطباق طبيعية وصحية 100%</p></div>
</div>`;
  });

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Appetie Restaurant — Full Nutritional Information"/>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.brand span{opacity:.4;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;margin-left:12px;letter-spacing:.05em}
.topbar-right{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase}
.hero{padding:60px 40px 48px;max-width:960px;margin:0 auto}

@media(max-width:640px){.topbar{padding:16px 20px}.hero{padding:36px 20px 32px}.content{padding:0 20px 60px}.card-header{padding:28px 20px 22px;flex-direction:column;gap:12px;align-items:flex-start}.item-count{text-align:left}.card-footer{padding:16px 20px}.tab{font-size:12px;padding:9px 12px}}
</style>

<body>

</body>

}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}
</script>
